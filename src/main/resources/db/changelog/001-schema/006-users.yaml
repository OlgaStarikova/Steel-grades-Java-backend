databaseChangeLog:

  - changeSet:
      id: 2026-04-21-006-create-users
      author: Olga-Starykova
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: username
                  type: varchar(50)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: full_name
                  type: varchar(100)
                  constraints:
                    nullable: false

              - column:
                  name: role
                  type: varchar(50)
                  constraints:
                    nullable: false
