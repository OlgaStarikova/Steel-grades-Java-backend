databaseChangeLog:
  - changeSet:
      id: 2026-04-22-001-steel-recipes
      author: Olga-Starykova
      changes:
        - createTable:
            tableName: steel_recipes
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: steel_grade_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_steel_recipes_steel
                    referencedTableName: steel_grades
                    referencedColumnNames: id

              - column:
                  name: tmc_catalog_id
                  type: bigint
                  constraints:
                    nullable: true  # true, оскільки для параметрів (наприклад, "Угар") id_tmc може бути відсутнім
                    foreignKeyName: fk_steel_recipes_tmc
                    referencedTableName: tmc_catalog
                    referencedColumnNames: id

              - column:
                  name: section_id
                  type: int
                  remarks: "1 - Металозавалка, 2 - Понад 100%, 3 - Інші"
                  constraints:
                    nullable: false

              - column:
                  name: sort_order
                  type: int
                  remarks: "Порядок виведення елементів всередині секції"
                  constraints:
                    nullable: false

              - column:
                  name: percentage
                  type: decimal(10,3)
                  constraints:
                    nullable: true

              - column:
                  name: note
                  type: text
                  constraints:
                    nullable: true

              - column:
                  name: formula_id
                  type: int
                  constraints:
                    nullable: true

              - column:
                  name: coefficient
                  type: varchar(100) # "Скрап", "Угар", "Shlak"
                  constraints:
                    nullable: true

              - column:
                  name: is_deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

        #  індекси для швидкого пошуку
        - createIndex:
            indexName: idx_charge_recipes_steel
            tableName: steel_recipes
            columns:
              - column:
                  name: steel_grade_id
              - column:
                  name: is_deleted